<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=./index.html" />
  <title>PETATOE — Redirecting</title>
  <link rel="icon" type="image/svg+xml" href="./assets/icons/petatoe-app-icon.svg?v=9.4.23-icon1"/>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/icon-32x32.png?v=9.4.23-icon1"/>
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/icon-16x16.png?v=9.4.23-icon1"/>
  <link rel="shortcut icon" href="./favicon.ico?v=9.4.23-icon1"/>
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png?v=9.4.23-icon1"/>
  <link rel="manifest" href="./manifest.webmanifest?v=9.4.23-icon1"/>
  <meta name="theme-color" content="#061832"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PETATOE"/>
  <meta name="application-name" content="PETATOE"/>
  <meta name="msapplication-TileColor" content="#061832"/>
  <meta name="msapplication-config" content="./browserconfig.xml?v=9.4.23-icon1"/>
  <script>
    (function(){
      var raw='';
      try{raw=String(localStorage.getItem('petatoe_language')||localStorage.getItem('petatoe_lang')||'').toLowerCase();}catch(_){ }
      var ar=raw==='ar';
      document.documentElement.lang=ar?'ar':'en';
      document.documentElement.dir=ar?'rtl':'ltr';
      document.addEventListener('DOMContentLoaded',function(){
        document.title=ar?'PETATOE — تحويل':'PETATOE — Redirecting';
        var p=document.getElementById('redirectMessage'),a=document.getElementById('redirectLink');
        if(p)p.firstChild.nodeValue=ar?'جارٍ التحويل إلى PETATOE... ':'Redirecting to PETATOE... ';
        if(a)a.textContent=ar?'اضغط هنا':'Click here';
      });
    })();
  </script>
</head>
<body>
  <p id="redirectMessage">Redirecting to PETATOE... <a id="redirectLink" href="./index.html">Click here</a></p>
</body>
</html>
